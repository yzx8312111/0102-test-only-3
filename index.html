<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>二技116年班「孫子兵法」期末考</title>
  <style>
      body { 
          background-color: #FFEB3B; 
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
          padding: 15px; 
          margin: 0; 
          box-sizing: border-box; 
          -webkit-user-select: none; 
          user-select: none;         
      }
      .page { display: none; max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      .active { display: block; }
      h1 { text-align: center; color: #d32f2f; font-size: 24px; }
      .warning { color: #d32f2f; font-weight: bold; margin-bottom: 10px; font-size: 15px; line-height: 1.6; }
      input, button { width: 100%; padding: 15px; margin: 10px 0; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; }
      button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
      button:hover { opacity: 0.9; }
      
      /* 高畫質 Canvas 外觀控制 */
      #quizCanvas {
          width: 100%;
          height: auto;
          background: #ffffff;
          cursor: pointer;
          display: block;
          margin-bottom: 15px;
          border-radius: 8px;
          border: 1px solid #e0e0e0;
      }
      #statusMsg { color: #666; font-size: 14px; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>

<div id="page1" class="page active">
  <h1>二技116年班「孫子兵法」<br>期末考</h1>
  <div class="warning">
      <p>１. 不得查閱任何形式之資料，不得交談或有任何違規、舞弊情事。</p>
      <p>２. 【核心警告：作答中只要切換視窗、點擊擴充功能、開啟其他 App 、拉出系統選單或離開答題頁面，系統將判定為舞弊並「立即強制結束測驗且提交答案」】。</p>
      <p>３. 完成測驗只有【一次】機會，不得重覆提交；將以表單自動上傳之時間戳記為檢核依據。</p> 
      <p>４. 下一頁【姓名+出生月日4位數】，例：1月25日，輸入格式：王小明0125。與上階段表單所填不相符者，不予計分。</p>
  </div>
  <button type="button" id="btnToPage2">確認後，繼續下一步</button>
</div>

<div id="page2" class="page">
  <h2>考生資料填寫</h2>
  <input type="text" id="class" placeholder="班級 ＯＯ組">
  <input type="text" id="id" placeholder="學號 末3碼">
  <input type="text" id="name" placeholder="姓名+出生月日４位數">
  <p style="text-align: center; color: red; font-weight: bold; font-size: 14px;">⚠️ 開始測驗後，偵測到切換視窗、拉出系統選單或離開，將立即強制交卷！</p>
  <button type="button" id="btnStartQuiz">輸入通關密碼後開始測驗</button>
</div>

<div id="page3" class="page">
  <canvas id="quizCanvas" width="1200" height="1100"></canvas>
  
  <div id="navContainer" style="display:flex; gap:10px;">
      <button id="prevBtn" style="background-color: #757575;">上一題</button>
      <button id="nextBtn">下一題</button>
  </div>
  <button id="submitBtn" style="background-color: #d32f2f; display:none;">交卷</button>
</div>

<div id="page4" class="page">
  <h1>測驗結果</h1>
  <div id="resultInfo"></div>
  <div id="statusMsg">答案安全同步中，請稍候...</div>
</div>

<script>
(function() {
  const rawQuestions = [
       { id: 1, q: "《孫子兵法》開宗明義提到「兵者，國之大事」，其中「兵」字在原始字形（甲骨文）中象徵什麼意義？", options: ["(A) 雙手持盾防禦", "(B) 雙手持斧參戰", "(C) 士兵列隊前行", "(D) 戰車衝鋒陷陣"] },
       { id: 2, q: "在「法」的架構中，「曲制」在現代軍事管理中對應的是什麼？", options: ["(A) 組織架構與編制", "(B) 人事管理與指揮鏈", "(C) 後勤補給與財務", "(D) 武器保養與供應"] },
       { id: 3, q: "孫子所謂的「計」有三個層次，下列何者「不屬於」這三個層次？", options: ["(A) 計算敵我實力", "(B) 評估戰爭勝算", "(C) 制定策略謀略", "(D) 執行衝鋒計畫"] }        
  ];

  let questions = [];
  let userAnswers = {};
  let currentIndex = 0;
  let startTime, endTime;
  let isSubmitted = false;
  let isQuizStarted = false; 

  let lastHeartbeatTime = Date.now();
  let heartbeatInterval = null;
  let optionAreas = [];

  window.addEventListener("blur", () => { if (isQuizStarted && !isSubmitted) triggerCheatDetection("離開視窗！"); });
  document.addEventListener("visibilitychange", () => { if (isQuizStarted && !isSubmitted && document.visibilityState === 'hidden') triggerCheatDetection("離開頁面！"); });

  function startHeartbeatCheck() {
      lastHeartbeatTime = Date.now();
      heartbeatInterval = setInterval(() => {
          if (!isQuizStarted || isSubmitted) { clearInterval(heartbeatInterval); return; }
          const currentTime = Date.now();
          const timePassed = currentTime - lastHeartbeatTime;
          if (timePassed > 600) { 
              clearInterval(heartbeatInterval);
              triggerCheatDetection("系統中斷（禁止啟動快捷工具、下拉功能或截圖）。");
              return;
          }
          lastHeartbeatTime = currentTime;
      }, 200);
  }

  function triggerCheatDetection(reason) {
      if (isSubmitted) return;
      alert(`🚨 舞弊警告：${reason}\n系統已立即強制交卷！`);
      finishQuiz();
  }

  function nextPage(targetId) {
      const pages = document.getElementsByClassName('page');
      for (let i = 0; i < pages.length; i++) pages[i].style.display = 'none';
      document.getElementById(targetId).style.display = 'block';
  }

  function uploadToGoogleForm(cls, id, name, sTime, eTime) {
      const formActionURL = "https://docs.google.com/forms/d/e/1FAIpQLScK089NfPbM3CmQ6VOkPJShLFUF8IUMRWQQCDsjhwd_Cuzjfg/formResponse";
      let finalAnsList = [];
      for (let currentId = 1; currentId <= 46; currentId++) {
          let foundIdx = questions.findIndex(q => q.id === currentId);
          let selectedOptIdx = (foundIdx !== -1 && userAnswers[foundIdx] !== undefined) ? userAnswers[foundIdx] : -1;
          finalAnsList.push(`${currentId}:${selectedOptIdx}`);
      }
      const encodedAnswers = finalAnsList.join(",");
      const formData = new FormData();
      formData.append("entry.1701110363", cls);
      formData.append("entry.562469036", id);
      formData.append("entry.396393197", name);
      formData.append("entry.1143918102", encodedAnswers);
      formData.append("entry.990500050", sTime);
      formData.append("entry.83330138", eTime);
      fetch(formActionURL, { method: "POST", mode: "no-cors", body: formData })
      .then(() => { document.getElementById('statusMsg').innerText = "✅ 測驗結果已成功傳送至雲端。"; });
  }

  function finishQuiz() {
      if (isSubmitted) return;
      isSubmitted = true;
      isQuizStarted = false; 
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      endTime = new Date();
      nextPage('page4');
      const formatTime = (date) => date.toTimeString().split(' ')[0];
      const cls = document.getElementById('class').value || "未填";
      const id = document.getElementById('id').value || "未填";
      const name = document.getElementById('name').value || "未填";
      document.getElementById('resultInfo').innerHTML = `<p>班級：${cls}</p><p>學號：${id}</p><p>姓名：${name}</p><p>結束時間：${formatTime(endTime)}</p>`;
      uploadToGoogleForm(cls, id, name, formatTime(startTime), formatTime(endTime));
  }

  document.getElementById('btnToPage2').addEventListener('click', () => nextPage('page2'));
  document.getElementById('btnStartQuiz').addEventListener('click', () => {
      const passwordInput = prompt("請輸入今日考試通關密碼：");
      if (passwordInput !== "因利制權") { alert("密碼錯誤"); return; }
      startTime = new Date();
      questions = [...rawQuestions].sort(() => Math.random() - 0.5);
      nextPage('page3');
      initCanvas();
      renderCanvasQuestion();
      setTimeout(() => { isQuizStarted = true; startHeartbeatCheck(); }, 1000);
  });

  // =======================================================
  // Canvas 圖形化考卷繪製系統（高解析大字體優化版）
  // =======================================================
  const canvas = document.getElementById('quizCanvas');
  const ctx = canvas.getContext('2d');

  function initCanvas() {
      // 支援手機高難度精準觸發與縮放點擊
      const clickHandler = function(e) {
          if (!isQuizStarted || isSubmitted) return;
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          
          let clientX = e.clientX;
          let clientY = e.clientY;
          
          if (e.touches && e.touches[0]) {
              clientX = e.touches[0].clientX;
              clientY = e.touches[0].clientY;
          }
          
          const clickX = (clientX - rect.left) * scaleX;
          const clickY = (clientY - rect.top) * scaleY;

          for (let area of optionAreas) {
              if (clickX >= area.x && clickX <= area.x + area.w && clickY >= area.y && clickY <= area.y + area.h) {
                  userAnswers[currentIndex] = area.index;
                  renderCanvasQuestion();
                  break;
              }
          }
      };
      canvas.addEventListener('click', clickHandler);
  }

  // 斷行演算法（同步放大字體間距控制）
  function wrapText(context, text, x, y, maxWidth, lineHeight) {
      const words = text.split('');
      let line = '';
      let currentY = y;
      for(let n = 0; n < words.length; n++) {
          let testLine = line + words[n];
          let metrics = context.measureText(testLine);
          if (metrics.width > maxWidth && n > 0) {
              context.fillText(line, x, currentY);
              line = words[n];
              currentY += lineHeight;
          } else {
              line = testLine;
          }
      }
      context.fillText(line, x, currentY);
      return currentY + lineHeight;
  }

  function renderCanvasQuestion() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      optionAreas = [];

      const q = questions[currentIndex];
      
      // 1. 繪製頂部進度（大字體 36px）
      ctx.fillStyle = "#111111";
      ctx.font = "bold 36px -apple-system, sans-serif";
      const titleText = `第 ${currentIndex + 1}/${questions.length} 題`;
      ctx.fillText(titleText, 40, 70);
      
      // 2. 繪製題幹題目（加大至 34px，大幅提升易讀性）
      ctx.font = "bold 34px -apple-system, sans-serif";
      ctx.fillStyle = "#222222";
      let nextY = wrapText(ctx, q.q, 40, 140, 1120, 52);
      nextY += 40; // 留白高度

      // 3. 繪製四個選項（每格寬度優化、文字加大至 32px）
      q.options.forEach((opt, idx) => {
          const isSelected = (userAnswers[currentIndex] === idx);
          
          // 選項按鈕大小加倍（高度 100px 方便手指點擊）
          const area = { x: 40, y: nextY, w: 1120, h: 100, index: idx };
          optionAreas.push(area);

          // 繪製卡片底色與框線
          ctx.beginPath();
          ctx.roundRect(area.x, area.y, area.w, area.h, 12);
          ctx.fillStyle = isSelected ? "#fff59d" : "#f8f9fa"; // 選中時亮黃色，平常淺灰底色
          ctx.fill();
          
          ctx.lineWidth = isSelected ? 4 : 2;
          ctx.strokeStyle = isSelected ? "#fbc02d" : "#cccccc";
          ctx.stroke();

          // 繪製選項文字（加大至 32px，垂直居中）
          ctx.fillStyle = "#333333";
          ctx.font = "32px -apple-system, sans-serif";
          ctx.fillText(opt, area.x + 30, area.y + 60);

          nextY += 135; // 下一題選項按鈕的間距
      });

      // 4. 動態調整畫布高度以符合內容，防止手機版面跑位
      document.getElementById('prevBtn').onclick = () => { if(currentIndex > 0){ currentIndex--; renderCanvasQuestion(); } };
      document.getElementById('nextBtn').onclick = () => { if(currentIndex < questions.length - 1){ currentIndex++; renderCanvasQuestion(); } };
      
      if (currentIndex === questions.length - 1) {
          document.getElementById('nextBtn').style.display = 'none';
          document.getElementById('submitBtn').style.display = 'block';
          document.getElementById('submitBtn').onclick = finishQuiz;
      } else {
          document.getElementById('nextBtn').style.display = 'block';
          document.getElementById('submitBtn').style.display = 'none';
      }
  }
})();
</script>
</body>
</html>
